version: 2
updates:
  - package-ecosystem: "gomod"
    directories: ["/grpcbin", "/grpc-loadtest", "/oauth2-mock"]
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "gomod"
      include: "scope"

  - package-ecosystem: "docker"
    directories: ["/grpcbin", "/grpc-loadtest", "/oauth2-mock"]
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
